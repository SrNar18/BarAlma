# =====================================================
# Alma Bar Restaurant — Netlify Configuration
# =====================================================

[build]
  functions = "netlify/functions"
  command   = "npm install"
  publish   = "."

# ── Redireccionaments d'API ───────────────────────
[[redirects]]
  from   = "/api/login"
  to     = "/.netlify/functions/login"
  status = 200

[[redirects]]
  from   = "/api/get-upload-url"
  to     = "/.netlify/functions/get-upload-url"
  status = 200

[[redirects]]
  from   = "/api/confirm-upload"
  to     = "/.netlify/functions/confirm-upload"
  status = 200

[[redirects]]
  from   = "/api/carta-status"
  to     = "/.netlify/functions/carta-status"
  status = 200

# ── Servir carta.pdf des de Netlify Blobs ─────────
[[redirects]]
  from   = "/carta.pdf"
  to     = "/.netlify/functions/serve-carta"
  status = 200
  force  = true
